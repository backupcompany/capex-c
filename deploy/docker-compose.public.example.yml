# Example VPS stack — copy to server as docker-compose.yml and fill secrets.
# Production Siloam: SSO via Azure Entra + domain siloamhospitals.com (no IP allowlist).

services:
  capex-api:
    image: ghcr.io/YOUR_ORG/capex-api:latest
    container_name: capex-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:3001"
    environment:
      NODE_ENV: production
      CORS_ORIGINS: "https://capex.siloamhospitals.com"
      FRONTEND_URL: "https://capex.siloamhospitals.com"
      ALLOWED_EMAIL_DOMAINS: "siloamhospitals.com"
      # SUPABASE_*, JWT_ACCESS_SECRET, etc. from capexbe/.env.example

  capex-web:
    image: ghcr.io/YOUR_ORG/capex-web:latest
    container_name: capex-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:3000"
    environment:
      NODE_ENV: production
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      NEXT_PUBLIC_CAPEXBE_URL: "https://capex-api.siloamhospitals.com"
      NEXT_PUBLIC_USE_BACKEND_SESSION: "true"
      NEXT_PUBLIC_ENABLE_AZURE_SSO: "true"
