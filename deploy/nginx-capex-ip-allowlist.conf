# CAPEX — nginx rate limiting (+ optional IP allowlist for dev/demo only)
#
# Production Siloam: do NOT use IP allowlist — access control is Microsoft SSO
# on https://capex.siloamhospitals.com (Azure Entra tenant + ALLOWED_EMAIL_DOMAINS).
#
# 1) Place `limit_req_zone` in http { } (once per nginx.conf)
# 2) Place location rules inside server { } for capex-web / capex-api

# --- http { } block (add once) ---
#
# limit_req_zone $binary_remote_addr zone=capex_general:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=capex_auth:10m rate=5r/m;
# limit_req_status 429;

geo $capex_ip_allowed {
    default 1;
    127.0.0.1 1;
    ::1       1;
    # Optional dev/demo IPs — uncomment and set default 0 to enforce allowlist:
    # default 0;
    # 203.0.113.10 1;
    # 203.0.113.11 1;
}

