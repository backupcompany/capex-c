# CAPEX — nginx IP allowlist + rate limiting
#
# 1) Place `geo` + `limit_req_zone` in http { } (once per nginx.conf)
# 2) Place location rules inside server { } for capex-web / capex-api

# --- http { } block (add once) ---
#
# limit_req_zone $binary_remote_addr zone=capex_general:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=capex_auth:10m rate=5r/m;
# limit_req_status 429;

geo $capex_ip_allowed {
    default 0;
    127.0.0.1 1;
    ::1       1;
    203.0.113.10 1;   # example office IP — replace with yours
    203.0.113.11 1;   # example office IP — replace with yours
}

